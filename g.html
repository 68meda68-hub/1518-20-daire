<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabit Hız Rota + Dönüş</title>

  <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
  <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet"/>

  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    #zoom-level {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div id="zoom-level">Zoom: 15.5</div>

<script>
maptilersdk.config.apiKey = "aITbmYVmtmwD6PQn83NB";

const startCenter = [34.007964, 38.364154];

const route = [
  [34.007964, 38.364154],
  [34.016504, 38.367098],
  [34.010968, 38.369689],
  [34.010367, 38.374265],
  [34.0286, 38.3864]
];

const map = new maptilersdk.Map({
  container: "map",
  style: maptilersdk.MapStyle.HYBRID,
  center: startCenter,
  zoom: 15.5,
  pitch: 45,
  bearing: 0,
  projection: "globe"
});

const zoomBox = document.getElementById("zoom-level");

map.on("zoom", () => {
  zoomBox.innerHTML = "Zoom: " + map.getZoom().toFixed(2);
});

let rotation;

map.on("load", () => {

  map.addSource("parsel", {
    type: "geojson",
    data: {
      "type": "FeatureCollection",
      "features": [{
        "type": "Feature",
        "geometry": {
          "type": "MultiPolygon",
          "coordinates": [[[[34.028474246382892,38.386532429904385],
          [34.028845834078986,38.386513263476594],
          [34.028802487012882,38.386328845213853],
          [34.028431609455872,38.386350638573361],
          [34.028474246382892,38.386532429904385]]]]
        }
      }]
    }
  });
  
  // 🔥 Parsel köşe koordinatları
	const parselCorners = [
	  [34.028474246382892,38.386532429904385],
	  [34.028845834078986,38.386513263476594],
	  [34.028802487012882,38.386328845213853],
	  [34.028431609455872,38.386350638573361]
	];

	// 📍 Marker ekleme (stabil)
	parselCorners.forEach(coord => {

	  new maptilersdk.Marker({
		color: '#007cbf',
		scale: 0.5,
		anchor: 'center'   // 🔥 önemli
	  })
		.setLngLat(coord)
		.addTo(map);

	});

  map.addLayer({
    id: "parsel-outline",
    type: "line",
    source: "parsel",
    paint: {
      "line-color": "#ffff00",
      "line-width": 4
    }
  });

  startSmoothRoute();

});


// 🔥 SABİT HIZLI ROTА
function startSmoothRoute() {

  const totalDuration = 60000; // toplam süre
  let startTime = null;

  // 🔹 İki nokta arası mesafe (basit hesap)
  function getDistance(a, b) {
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    return Math.sqrt(dx * dx + dy * dy);
  }

  // 🔹 Toplam rota uzunluğu
  let totalDistance = 0;
  for (let i = 0; i < route.length - 1; i++) {
    totalDistance += getDistance(route[i], route[i + 1]);
  }

  function animate(time) {

    if (!startTime) startTime = time;

    const elapsed = time - startTime;

    // 🔥 TAM SABİT HIZ
    const distanceCovered = (elapsed / totalDuration) * totalDistance;

    let traveled = 0;

    for (let i = 0; i < route.length - 1; i++) {

      const segment = getDistance(route[i], route[i + 1]);

      if (traveled + segment >= distanceCovered) {

        const segmentProgress = (distanceCovered - traveled) / segment;

        const from = route[i];
        const to = route[i + 1];

        const lng = from[0] + (to[0] - from[0]) * segmentProgress;
        const lat = from[1] + (to[1] - from[1]) * segmentProgress;

        map.setCenter([lng, lat]);
        map.setZoom(15.5);
        map.setPitch(45);

        break;
      }

      traveled += segment;
    }

    if (elapsed < totalDuration) {
      requestAnimationFrame(animate);
    } else {
      startRotation();
    }
  }

  requestAnimationFrame(animate);
}


// 🔄 DÖNÜŞ
function startRotation() {

  // 🔥 Önce zoom 17'ye yumuşak geç
  map.easeTo({
    zoom: 17,
    duration: 6000,   // zoom süresi (ms)
    pitch: 45
  });

  // Zoom bittikten sonra dönmeye başla
  setTimeout(() => {

    if (rotation) cancelAnimationFrame(rotation);

    function spin() {
      map.setBearing(map.getBearing() + 0.03); // daha yavaş dönüş
      rotation = requestAnimationFrame(spin);
    }

    spin();

  }, 6200);
}

</script>

</body>
</html>
